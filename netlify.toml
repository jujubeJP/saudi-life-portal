[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API エンドポイント: /.netlify/functions/content → /api/content
[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

# チャットボット API
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
